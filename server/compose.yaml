services:
  server:
    build:
      context: .
    image: claude-usage-server
    ports:
      - "8000:8000"
    # Entra / session / admin config comes from a local .env (see .env.example).
    env_file:
      - path: .env
        required: false
    environment:
      # Override the DB path onto the mounted volume (wins over .env).
      DATABASE: /data/usage.db
    volumes:
      - usage-data:/data
    restart: unless-stopped

volumes:
  usage-data:
