name: claude-usage

services:
  server:
    build:
      context: .
    image: claude-usage-server
    ports:
      - "8420:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE: /data/usage.db
    volumes:
      - usage-data:/data
    restart: unless-stopped

volumes:
  usage-data:
